name: Student Submission Review

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  validate_submission:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get changed files from PR
        run: |
          set -euo pipefail

          PR_NUM=${{ github.event.pull_request.number }}
          PAGE=1
          : > pr_files.ndjson

          while true; do
            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUM/files?per_page=100&page=$PAGE" \
              > pr_files_page.json

            COUNT=$(jq 'length' pr_files_page.json)
            if [[ "$COUNT" -eq 0 ]]; then
              break
            fi

            jq -c '.[]' pr_files_page.json >> pr_files.ndjson

            if [[ "$COUNT" -lt 100 ]]; then
              break
            fi

            PAGE=$((PAGE + 1))
          done

          if [[ -s pr_files.ndjson ]]; then
            jq -s '.' pr_files.ndjson > pr_files.json
          else
            echo "[]" > pr_files.json
          fi

          jq -r '.[] | [.filename, .status] | @tsv' pr_files.json > changed_files.tsv

      - name: Validate submission rules
        id: validate
        run: |
          set -euo pipefail

          ERROR_MSG=""
          while IFS=$'\t' read -r file status; do
            if [[ "$file" == "README.md" ]]; then
              ERROR_MSG+="❌ 不可修改 README.md\n"
            fi
            if [[ "$file" == "submit/template.py" ]]; then
              ERROR_MSG+="❌ 不可修改 submit/template.py\n"
            fi
          done < changed_files.tsv

          mapfile -t ADDED_SUBMIT_FILES < <(awk -F'\t' '$2 == "added" && $1 ~ /^submit\//' changed_files.tsv | cut -f1)
          NEW_COUNT=${#ADDED_SUBMIT_FILES[@]}
          TOTAL_CHANGED_COUNT=$(awk 'END { print NR }' changed_files.tsv)
          ADDED_FILE_LIST="無"
          if [[ $NEW_COUNT -gt 0 ]]; then
            ADDED_FILE_LIST=$(printf '%s, ' "${ADDED_SUBMIT_FILES[@]}")
            ADDED_FILE_LIST=${ADDED_FILE_LIST%, }
          fi

          if [[ $NEW_COUNT -ne 1 ]]; then
            ERROR_MSG+="❌ 你必須只新增一個檔案在 submit/ 目錄中 (目前 $NEW_COUNT 個: $ADDED_FILE_LIST)\n"
          else
            NEW_FILE="${ADDED_SUBMIT_FILES[0]}"
            if ! echo "$NEW_FILE" | grep -qE '^submit/W4_[0-9]{9}\.py$'; then
              ERROR_MSG+="❌ 新增檔名必須符合 W4_(9位數字).py (目前: $NEW_FILE)\n"
            elif [[ $TOTAL_CHANGED_COUNT -ne 1 ]]; then
              ERROR_MSG+="❌ 除了 $NEW_FILE 外，不可變更其他檔案\n"
              ERROR_MSG+="目前變更檔案如下：\n"
              while IFS=$'\t' read -r file status; do
                ERROR_MSG+="- $file ($status)\n"
              done < changed_files.tsv
            fi
          fi

          if [[ -n "$ERROR_MSG" ]]; then
            echo "⚠️ 提交規則檢查未通過，請依照以下提示修改後再重新提交：" > pr_feedback.md
            echo "" >> pr_feedback.md
            echo -e "$ERROR_MSG" >> pr_feedback.md
            echo "invalid" > submission_status.txt
            exit 1
          else
            echo "✅ 提交符合規則，PR 流程正確！" > pr_feedback.md
            echo "valid" > submission_status.txt
          fi

      - name: Post feedback comment
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: pr_feedback.md

  ai_review:
    needs: validate_submission
    runs-on: ubuntu-latest
    if: success()  # 只有通過規則才跑 AI
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install google-generativeai

      - name: Prepare diff for AI review
        run: |
          set -euo pipefail

          PR_NUM=${{ github.event.pull_request.number }}
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUM.diff" \
            > pr_diff.txt

      - name: Run Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${GEMINI_API_KEY:-}" ]]; then
            echo "⚠️ GEMINI_API_KEY 尚未設定，已略過 AI Review。" > review_result.md
            exit 0
          fi

          python3 - <<'EOF'
          import os
          import google.generativeai as genai

          genai.configure(api_key=os.getenv("GEMINI_API_KEY"))

          diff = open("pr_diff.txt", encoding="utf-8").read()
          prompt = f"""你是一位資深軟體工程師。
          以下是學生的提交檔案修改，請進行簡短 Code Review。

          ### 優點
          - 至多 2 點

          ### 建議改進
          - 每檔案最多 3 條建議
          - 用 bullet point
          - 格式: - [行號] 問題簡述與改進建議

          ### 程式品質分數
          - 給 0~20 分
          - 僅輸出數字

          程式碼修改如下：
          {diff}
          """

          try:
              model = genai.GenerativeModel("gemini-2.5-flash")
              response = model.generate_content(prompt)
              review = getattr(response, "text", "").strip() or "⚠️ AI 回傳空內容，請稍後重試。"
          except Exception as exc:
              review = f"⚠️ AI Review 執行失敗：{exc}"

          with open("review_result.md", "w", encoding="utf-8") as f:
              f.write(review)
          EOF

      - name: Post AI review
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: review_result.md


